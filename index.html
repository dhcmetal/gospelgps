<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1a38">
<meta name="description" content="GospelGPS — a step-by-step companion for presenting the gospel of Jesus Christ from the King James Bible.">
<title>GospelGPS</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GospelGPS">
<meta name="mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ===== Top bar ===== -->
<header id="topbar">
  <button id="backBtn" class="icon-btn" hidden aria-label="Back">‹</button>
  <div id="topTitle">GospelGPS</div>
  <button id="textSizeBtn" class="icon-btn" aria-label="Change text size" title="Text size">A<span>A</span></button>
</header>

<!-- ===== Screens ===== -->
<main id="app">
  <section class="screen" id="screen-home" data-screen="home"></section>
  <section class="screen" id="screen-present" data-screen="present" hidden></section>
  <section class="screen" id="screen-practice" data-screen="practice" hidden></section>
  <section class="screen" id="screen-journal" data-screen="journal" hidden></section>
  <section class="screen" id="screen-map" data-screen="map" hidden></section>
  <section class="screen" id="screen-about" data-screen="about" hidden></section>
</main>

<!-- ===== Bottom navigation ===== -->
<nav id="tabbar">
  <button class="tab is-active" data-goto="home">
    <span class="tab-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/></svg>
    </span>
    <span class="tab-label">Home</span>
  </button>
  <button class="tab" data-goto="present">
    <span class="tab-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M12 6c-2-1.6-4.4-2-8-2v13c3.6 0 6 .4 8 2"/><path d="M12 6c2-1.6 4.4-2 8-2v13c-3.6 0-6 .4-8 2"/></svg>
    </span>
    <span class="tab-label">Present</span>
  </button>
  <button class="tab" data-goto="practice">
    <span class="tab-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 3.5 14.4 9l5.6.5-4.3 3.8 1.3 5.7L12 16l-5 3 1.3-5.7L4 9.5 9.6 9z"/></svg>
    </span>
    <span class="tab-label">Practice</span>
  </button>
  <button class="tab" data-goto="journal">
    <span class="tab-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M6 3.5h11a1.5 1.5 0 0 1 1.5 1.5v14A1.5 1.5 0 0 1 17 20.5H6z"/><path d="M6 3.5A1.5 1.5 0 0 0 4.5 5v14A1.5 1.5 0 0 0 6 20.5"/><path d="M9 8h6M9 12h6"/></svg>
    </span>
    <span class="tab-label">Journal</span>
  </button>
  <button class="tab" data-goto="map">
    <span class="tab-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 21s6.5-6.1 6.5-10.5a6.5 6.5 0 1 0-13 0C5.5 14.9 12 21 12 21z"/><circle cx="12" cy="10.3" r="2.4"/></svg>
    </span>
    <span class="tab-label">Verse Map</span>
  </button>
</nav>

<!-- ===== Overlays ===== -->
<div id="sheet" class="sheet" hidden><div class="sheet-inner" id="sheetInner"></div></div>
<div id="celebrate" class="celebrate" hidden></div>
<div id="toast" class="toast" hidden></div>

<div id="installBanner" class="install-banner" hidden>
  <div class="ib-text">
    <strong>Install GospelGPS on your phone</strong>
    <span id="installHow"></span>
  </div>
  <button id="installDismiss" class="btn btn-quiet">Got it</button>
</div>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
</body>
</html>
